<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla Mundialista 2026 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --am:#FCD116;--az:#003087;--ro:#CE1126;
  --bg:#05091a;--card:#0d1530;--card2:#111d3d;
  --border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#7a8aaa;--dim:#3a4a6a;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{background:linear-gradient(160deg,var(--az),#001a55 60%,var(--bg));border-bottom:3px solid var(--am);padding:1.75rem 1rem 1.5rem;text-align:center}
.flag{display:flex;height:5px;max-width:120px;margin:0 auto 1rem;border-radius:3px;overflow:hidden}
.flag div:nth-child(1){flex:2;background:var(--am)}
.flag div:nth-child(2){flex:1;background:var(--az)}
.flag div:nth-child(3){flex:1;background:var(--ro)}
header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,8vw,68px);letter-spacing:.05em;color:#fff;line-height:1}
header h1 span{color:var(--am)}
header p{font-size:12px;color:var(--muted);margin-top:6px}
header .fam{font-size:11px;color:rgba(252,209,22,.55);margin-top:3px;letter-spacing:.12em;text-transform:uppercase}

.nav{display:flex;justify-content:center;gap:6px;padding:.75rem;position:sticky;top:0;background:var(--bg);z-index:20;border-bottom:1px solid var(--border)}
.nav button{padding:8px 20px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;font-weight:500}
.nav button.active{background:var(--am);border-color:var(--am);color:var(--az);font-weight:700}

main{max-width:780px;margin:0 auto;padding:1.25rem 1rem 4rem}
.panel{display:none}.panel.active{display:block}

.who-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1.125rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.who-bar label{font-size:13px;color:var(--muted);white-space:nowrap}
.who-bar select{flex:1;min-width:150px;padding:8px 10px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;cursor:pointer}
.who-bar select:focus{outline:none;border-color:var(--am)}
.save-btn{padding:9px 22px;background:var(--am);color:var(--az);border:none;border-radius:6px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap}
.save-btn:hover{background:#ffe040}
.save-btn:disabled{background:var(--dim);color:#888;cursor:not-allowed}

.sync-bar{font-size:12px;color:var(--muted);margin-bottom:1rem;display:none}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot.ok{background:#22dd77}.dot.err{background:var(--ro)}.dot.spin{background:var(--am)}

.prog-wrap{margin-bottom:1.25rem;display:flex;align-items:center;gap:10px}
.prog-track{flex:1;height:5px;background:var(--card2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--am),var(--ro));border-radius:3px;transition:width .3s}
.prog-lbl{font-size:12px;color:var(--muted);white-space:nowrap}

.rules{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.rule{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted)}
.rule b{font-family:'Bebas Neue',sans-serif;font-size:17px;line-height:1}
.c-am{color:var(--am)}.c-bl{color:#7ab8ff}

.day-sec{margin-bottom:2rem}
.day-lbl{font-size:11px;letter-spacing:.15em;color:var(--am);text-transform:uppercase;font-weight:700;margin-bottom:.75rem;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* ── MATCH CARD ── */
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;transition:border-color .2s}
.mcard.done{border-color:rgba(252,209,22,.25)}
.mcard.draw{border-color:rgba(206,17,38,.25)}
.mmeta{font-size:11px;color:var(--dim);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.mnum{background:var(--az);color:var(--am);font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}

/* ── SCOREBOARD ── */
.scoreboard{display:grid;grid-template-columns:1fr 24px 1fr;align-items:center;gap:4px;margin-bottom:4px}

.team-col{display:flex;flex-direction:column;align-items:center;gap:8px}

.team-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(16px,4vw,22px);
  letter-spacing:.06em;
  color:var(--muted);
  text-align:center;
  line-height:1.1;
  transition:color .2s;
  cursor:default;
}
.team-col.winner .team-name{color:var(--am)}
.team-col.winner-pen .team-name{color:#ff8090}

.goal-input{
  width:64px;height:64px;
  background:var(--card2);
  border:2px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:36px;font-weight:700;
  font-family:'Bebas Neue',sans-serif;
  text-align:center;
  -moz-appearance:textfield;appearance:textfield;
  transition:border-color .2s,background .2s;
  cursor:pointer;
}
.goal-input::-webkit-outer-spin-button,.goal-input::-webkit-inner-spin-button{-webkit-appearance:none}
.goal-input:focus{outline:none;border-color:var(--am);background:#182040}
.team-col.winner .goal-input{border-color:var(--am);background:rgba(252,209,22,.08);color:var(--am)}
.team-col.winner-pen .goal-input{border-color:var(--ro);background:rgba(206,17,38,.08);color:#ff8090}

.vs-center{text-align:center;font-size:12px;font-weight:700;color:var(--dim)}

/* ── PENALTY BANNER ── */
.pen-banner{
  display:none;
  background:rgba(206,17,38,.08);
  border:1px solid rgba(206,17,38,.25);
  border-radius:7px;
  padding:10px 12px;
  margin-top:10px;
  text-align:center;
}
.pen-banner.show{display:block}
.pen-title{font-size:12px;color:#ff8090;font-weight:600;margin-bottom:8px}
.pen-btns{display:flex;gap:8px}
.pen-btn{
  flex:1;padding:8px 10px;
  border:1.5px solid rgba(206,17,38,.3);border-radius:6px;
  background:var(--card2);color:var(--muted);
  font-size:13px;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;
  cursor:pointer;text-align:center;transition:all .15s;
}
.pen-btn:hover{border-color:var(--ro);color:#ff8090}
.pen-btn.sel{background:rgba(206,17,38,.15);border-color:var(--ro);color:#ff6b7a}

/* ── TABLA ── */
.tbl-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.tbl-hdr h2{font-size:16px;font-weight:600}
.ref-btn{padding:7px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer}
.ref-btn:hover{color:var(--text)}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:1.5rem}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.875rem;text-align:center}
.scard.lead{border-color:var(--am);background:rgba(252,209,22,.04)}
.sc-rank{font-size:10px;color:var(--dim);margin-bottom:1px}
.sc-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-pts{font-size:32px;font-family:'Bebas Neue',sans-serif;color:var(--am);line-height:1}
.sc-lbl{font-size:9px;color:var(--dim);margin-bottom:1px}
.sc-sub{font-size:10px;color:var(--muted)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
thead th{padding:9px 8px;text-align:left;font-size:10px;letter-spacing:.1em;color:var(--am);text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:hover{background:var(--card)}
tbody td{padding:7px 8px;color:var(--muted);vertical-align:middle}
tbody td:first-child{color:var(--text);font-weight:500;font-size:11px;min-width:120px}
.pf{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.pf.w{background:rgba(252,209,22,.1);color:#ffe060;border:1px solid rgba(252,209,22,.25)}
.pf.p{background:rgba(206,17,38,.1);color:#ff8090;border:1px solid rgba(206,17,38,.25)}
.pf.n{background:rgba(255,255,255,.03);color:var(--dim);border:1px solid var(--border)}
.pb{display:inline-block;padding:1px 5px;border-radius:10px;font-size:10px;font-weight:700;margin-left:3px;vertical-align:middle}
.pb4{background:rgba(252,209,22,.15);color:var(--am);border:1px solid rgba(252,209,22,.3)}
.pb2{background:rgba(122,184,255,.12);color:#7ab8ff;border:1px solid rgba(122,184,255,.25)}
.sb{font-size:10px;color:var(--dim);margin-top:1px}
.loading{text-align:center;padding:2rem;color:var(--dim);font-size:14px}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;transition:transform .25s;z-index:100;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--am);color:var(--az)}
#toast.err{background:var(--ro);color:#fff}
</style>
</head>
<body>

<header>
  <div class="flag"><div></div><div></div><div></div></div>
  <div style="font-size:11px;letter-spacing:.2em;color:rgba(252,209,22,.6);text-transform:uppercase;margin-bottom:6px">FIFA World Cup 2026</div>
  <h1>Polla <span>Mundial</span> 2026</h1>
  <p>16avos de final · 28 jun – 3 jul</p>
  <p class="fam">Familia Güiza</p>
</header>

<nav class="nav">
  <button class="active" onclick="showPanel('form',this)">📋 Mis picks</button>
  <button onclick="showPanel('tabla',this)">🏅 Ver todos</button>
</nav>

<main>
  <div class="panel active" id="panel-form">
    <div class="who-bar">
      <label>¿Quién eres?</label>
      <select id="psel" onchange="loadP()">
        <option value="">— Elige tu nombre —</option>
      </select>
      <button class="save-btn" id="sbtn" onclick="save()">Guardar picks</button>
    </div>
    <div class="sync-bar" id="sbar"></div>
    <div class="rules">
      <div class="rule"><b class="c-am">4</b> Marcador exacto</div>
      <div class="rule"><b class="c-bl">2</b> Clasificado correcto</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
      <span class="prog-lbl" id="plbl">0 / 16 completados</span>
    </div>
    <div id="mform"></div>
  </div>

  <div class="panel" id="panel-tabla">
    <div class="tbl-hdr">
      <h2>Pronósticos de todos</h2>
      <button class="ref-btn" onclick="loadTabla()">↻ Actualizar</button>
    </div>
    <div class="sum-grid" id="sgrid"></div>
    <div class="tbl-wrap">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>
</main>
<div id="toast"></div>

<script>
const URL_GS = 'https://script.google.com/macros/s/AKfycbzQLHPFuSe0IXnfbHMUf7FP7EOHVpz8dclJPZY7xsbQN0ZfMQH4ruE7odK5XVCH5I63Kw/exec';

const PARTS = [
  'Yorguin Güiza V','Sandra Sandoval','Nicolas Güiza Sandoval',
  'Mathias Güiza Sandoval','Maximiliano Güiza Sandoval','Isabel Güiza V',
  'Daniel Soto','Jesus A. Güiza H','Stella Velasco',
  'Esteban Güiza V','Silvia Pabon','Ludy Velasco'
];

const MS = [
  {id:1, date:'Dom 28 jun',time:'13:00 CT',stad:'SoFi Stadium · Los Ángeles',     eq1:'Sudáfrica',    eq2:'Canadá'      },
  {id:2, date:'Lun 29 jun',time:'10:00 CT',stad:'Gillette Stadium · Boston',       eq1:'Alemania',     eq2:'Paraguay'    },
  {id:3, date:'Lun 29 jun',time:'14:00 MT',stad:'Est. BBVA · Monterrey',           eq1:'Países Bajos', eq2:'Marruecos'   },
  {id:4, date:'Lun 29 jun',time:'14:00 CT',stad:'NRG Stadium · Houston',           eq1:'Brasil',       eq2:'Japón'       },
  {id:5, date:'Mar 30 jun',time:'14:00 ET',stad:'MetLife · Nueva Jersey',          eq1:'Francia',      eq2:'Suecia'      },
  {id:6, date:'Mar 30 jun',time:'14:00 CT',stad:'AT&T Stadium · Dallas',           eq1:'C. de Marfil', eq2:'Noruega'     },
  {id:7, date:'Mar 30 jun',time:'14:00 MT',stad:'Azteca · Ciudad de México',       eq1:'México',       eq2:'Ecuador'     },
  {id:8, date:'Mié 1 jul', time:'14:00 ET',stad:'Mercedes-Benz · Atlanta',         eq1:'Inglaterra',   eq2:'RD del Congo'},
  {id:9, date:'Mié 1 jul', time:'13:00 PT',stad:"Levi's · San Francisco",         eq1:'EE.UU.',       eq2:'Bosnia'      },
  {id:10,date:'Mié 1 jul', time:'13:00 PT',stad:'Lumen Field · Seattle',           eq1:'Bélgica',      eq2:'Senegal'     },
  {id:11,date:'Jue 2 jul', time:'15:00 ET',stad:'BMO Field · Toronto',             eq1:'Portugal',     eq2:'Croacia'     },
  {id:12,date:'Jue 2 jul', time:'14:00 CT',stad:'SoFi Stadium · Los Ángeles',      eq1:'España',       eq2:'Cabo Verde'  },
  {id:13,date:'Jue 2 jul', time:'15:00 PT',stad:'BC Place · Vancouver',            eq1:'Suiza',        eq2:'Argelia'     },
  {id:14,date:'Vie 3 jul', time:'14:00 ET',stad:'Hard Rock · Miami',               eq1:'Argentina',    eq2:'Austria'     },
  {id:15,date:'Vie 3 jul', time:'14:00 CT',stad:'Arrowhead · Kansas City',         eq1:'Colombia',     eq2:'Ghana'       },
  {id:16,date:'Vie 3 jul', time:'14:00 CT',stad:'AT&T Stadium · Dallas',           eq1:'Australia',    eq2:'Egipto'      },
];

let me=null, picks={}, allData={}, res={};

function calcPts(p,r){
  if(!p?.clf||!r?.clf) return null;
  const exact=+p.s1===+r.s1&&+p.s2===+r.s2;
  return p.clf===r.clf?(exact?4:2):0;
}

/* INIT */
function init(){
  const sel=document.getElementById('psel');
  PARTS.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});
  buildForm();
}

/* BUILD FORM */
function buildForm(){
  const c=document.getElementById('mform'); c.innerHTML='';
  const days=[...new Set(MS.map(m=>m.date))];
  days.forEach(d=>{
    const s=document.createElement('div'); s.className='day-sec';
    s.innerHTML=`<div class="day-lbl">${d}</div>`;
    MS.filter(m=>m.date===d).forEach(m=>s.appendChild(mkCard(m)));
    c.appendChild(s);
  });
}

function mkCard(m){
  const d=document.createElement('div');
  d.className='mcard'; d.id=`mc${m.id}`;
  const e1=m.eq1.replace(/'/g,"\\'"), e2=m.eq2.replace(/'/g,"\\'");
  d.innerHTML=`
    <div class="mmeta"><span class="mnum">P${m.id}</span> ${m.time} · ${m.stad}</div>

    <div class="scoreboard">
      <div class="team-col" id="tc1-${m.id}">
        <div class="team-name">${m.eq1}</div>
        <input class="goal-input" type="number" id="s1-${m.id}"
          min="0" max="20" value="0"
          oninput="onScore(${m.id})" onchange="onScore(${m.id})">
      </div>
      <div class="vs-center">VS</div>
      <div class="team-col" id="tc2-${m.id}">
        <div class="team-name">${m.eq2}</div>
        <input class="goal-input" type="number" id="s2-${m.id}"
          min="0" max="20" value="0"
          oninput="onScore(${m.id})" onchange="onScore(${m.id})">
      </div>
    </div>

    <div class="pen-banner" id="pen-${m.id}">
      <div class="pen-title">🥅 Empate — ¿quién gana en penales?</div>
      <div class="pen-btns">
        <button class="pen-btn" id="pb1-${m.id}" onclick="setPen(${m.id},1,'${e1}')">${m.eq1}</button>
        <button class="pen-btn" id="pb2-${m.id}" onclick="setPen(${m.id},2,'${e2}')">${m.eq2}</button>
      </div>
    </div>`;
  return d;
}

/* SCORE CHANGE */
function onScore(id){
  if(!me) return;
  const v1=parseInt(document.getElementById(`s1-${id}`).value)||0;
  const v2=parseInt(document.getElementById(`s2-${id}`).value)||0;
  if(!picks[id]) picks[id]={};
  picks[id].s1=v1; picks[id].s2=v2; picks[id].score=`${v1}-${v2}`;

  const tc1=document.getElementById(`tc1-${id}`);
  const tc2=document.getElementById(`tc2-${id}`);
  const pen=document.getElementById(`pen-${id}`);
  const mc=document.getElementById(`mc${id}`);

  tc1.classList.remove('winner','winner-pen');
  tc2.classList.remove('winner','winner-pen');

  if(v1===v2){
    // EMPATE → mostrar panel penales
    pen.classList.add('show');
    mc.className='mcard draw';
    // si ya tenía pen elegido, resaltarlo
    const clf=picks[id].clf;
    const m=MS.find(x=>x.id===id);
    if(clf){
      if(clf===m.eq1) tc1.classList.add('winner-pen');
      else tc2.classList.add('winner-pen');
    }
  } else {
    // PARTIDO NORMAL → ocultar penales, elegir ganador automáticamente
    pen.classList.remove('show');
    document.getElementById(`pb1-${id}`).classList.remove('sel');
    document.getElementById(`pb2-${id}`).classList.remove('sel');
    const m=MS.find(x=>x.id===id);
    if(v1>v2){
      picks[id].clf=m.eq1;
      tc1.classList.add('winner');
      mc.className='mcard done';
    } else {
      picks[id].clf=m.eq2;
      tc2.classList.add('winner');
      mc.className='mcard done';
    }
    updateProg();
  }
}

/* PICK PENALTY WINNER */
function setPen(id,side,name){
  if(!me){toast('Selecciona tu nombre primero','err');return;}
  if(!picks[id]) picks[id]={s1:0,s2:0,score:'0-0'};
  picks[id].clf=name;
  document.getElementById(`pb1-${id}`).classList.toggle('sel',side===1);
  document.getElementById(`pb2-${id}`).classList.toggle('sel',side===2);
  const tc1=document.getElementById(`tc1-${id}`);
  const tc2=document.getElementById(`tc2-${id}`);
  tc1.classList.remove('winner-pen');
  tc2.classList.remove('winner-pen');
  (side===1?tc1:tc2).classList.add('winner-pen');
  document.getElementById(`mc${id}`).className='mcard draw';
  updateProg();
}

function updateProg(){
  const done=MS.filter(m=>picks[m.id]?.clf).length;
  document.getElementById('pfill').style.width=`${(done/16)*100}%`;
  document.getElementById('plbl').textContent=`${done} / 16 completados`;
}

/* LOAD PARTICIPANT */
function loadP(){
  me=document.getElementById('psel').value||null;
  picks={};
  if(!me) return;
  const ex=allData[me]||{};
  MS.forEach(m=>{
    const p=ex[m.id]||{};
    picks[m.id]={
      clf:p.clf||'',
      s1:parseInt(p.s1??p.score?.split('-')[0]??0),
      s2:parseInt(p.s2??p.score?.split('-')[1]??0),
      score:p.score||'0-0'
    };
    const lp=picks[m.id];
    // set inputs
    document.getElementById(`s1-${m.id}`).value=lp.s1;
    document.getElementById(`s2-${m.id}`).value=lp.s2;

    // reset visual
    const tc1=document.getElementById(`tc1-${m.id}`);
    const tc2=document.getElementById(`tc2-${m.id}`);
    const pen=document.getElementById(`pen-${m.id}`);
    tc1.classList.remove('winner','winner-pen');
    tc2.classList.remove('winner','winner-pen');
    pen.classList.remove('show');
    document.getElementById(`pb1-${m.id}`).classList.remove('sel');
    document.getElementById(`pb2-${m.id}`).classList.remove('sel');
    document.getElementById(`mc${m.id}`).className='mcard';

    if(!lp.clf) return;
    if(lp.s1===lp.s2){
      // fue empate + penales
      pen.classList.add('show');
      document.getElementById(`mc${m.id}`).className='mcard draw';
      if(lp.clf===m.eq1){tc1.classList.add('winner-pen');document.getElementById(`pb1-${m.id}`).classList.add('sel');}
      else{tc2.classList.add('winner-pen');document.getElementById(`pb2-${m.id}`).classList.add('sel');}
    } else {
      document.getElementById(`mc${m.id}`).className='mcard done';
      if(lp.clf===m.eq1) tc1.classList.add('winner');
      else tc2.classList.add('winner');
    }
  });
  updateProg();
}

/* SAVE */
async function save(){
  if(!me){toast('Selecciona tu nombre primero','err');return;}
  MS.forEach(m=>{
    const v1=parseInt(document.getElementById(`s1-${m.id}`).value)||0;
    const v2=parseInt(document.getElementById(`s2-${m.id}`).value)||0;
    if(!picks[m.id]) picks[m.id]={};
    picks[m.id].s1=v1;picks[m.id].s2=v2;picks[m.id].score=`${v1}-${v2}`;
  });
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.textContent='Guardando...';
  setSbar('spin','Enviando a Google Sheets...');
  try{
    const r=await fetch(URL_GS,{method:'POST',body:JSON.stringify({participant:me,picks})});
    const j=await r.json();
    if(j.status==='ok'){
      toast('¡Picks guardados! ✓','ok');
      setSbar('ok',`Guardado · ${new Date().toLocaleTimeString('es-CO')}`);
      await fetchAll(false);
    } else throw new Error(j.message);
  }catch(e){
    toast('Error al guardar','err');
    setSbar('err','No se pudo conectar con Google Sheets');
  }finally{btn.disabled=false;btn.textContent='Guardar picks';}
}

function setSbar(t,m){const e=document.getElementById('sbar');e.style.display='block';e.innerHTML=`<span class="dot ${t}"></span>${m}`;}

async function fetchAll(msg=true){
  try{
    const r=await fetch(`${URL_GS}?t=${Date.now()}`);
    const j=await r.json();
    if(j.status==='ok'){allData=j.data||{};if(msg)toast('Actualizado ✓','ok');}
  }catch(e){if(msg)toast('Sin conexión','err');}
}

/* TABLA */
async function loadTabla(){
  document.getElementById('sgrid').innerHTML='<div class="loading">Cargando...</div>';
  document.getElementById('tbody').innerHTML='';
  await fetchAll(false);
  buildTabla();
}

function buildTabla(){
  const pts={};
  PARTS.forEach(p=>{let t=0;MS.forEach(m=>{const v=calcPts((allData[p]||{})[m.id],res[m.id]);if(v)t+=v;});pts[p]=t;});
  const mx=Math.max(...Object.values(pts),0);
  const ord=[...PARTS].sort((a,b)=>pts[b]-pts[a]);

  const sg=document.getElementById('sgrid');sg.innerHTML='';
  ord.forEach((p,i)=>{
    const done=MS.filter(m=>(allData[p]||{})[m.id]?.clf).length;
    const c=document.createElement('div');
    c.className='scard'+(pts[p]===mx&&mx>0?' lead':'');
    c.innerHTML=`<div class="sc-rank">${i===0&&mx>0?'🥇':i===1&&mx>0?'🥈':i===2&&mx>0?'🥉':'#'+(i+1)}</div>
      <div class="sc-name">${p}</div><div class="sc-lbl">puntos</div>
      <div class="sc-pts">${pts[p]}</div><div class="sc-sub">${done}/16 picks</div>`;
    sg.appendChild(c);
  });

  document.getElementById('thead').innerHTML=`<tr><th>Partido</th>${PARTS.map(p=>`<th>${p.split(' ')[0]}</th>`).join('')}</tr>`;
  const tb=document.getElementById('tbody');tb.innerHTML='';
  MS.forEach(m=>{
    const tr=document.createElement('tr');
    const lbl=`<strong>${m.eq1}</strong><br><span style="color:var(--dim);font-size:10px">vs ${m.eq2} · P${m.id}</span>`;
    const cells=PARTS.map(p=>{
      const pk=(allData[p]||{})[m.id];
      if(!pk?.clf) return `<td><span class="pf n">—</span></td>`;
      const pv=calcPts(pk,res[m.id]);
      const badge=pv===4?`<span class="pb pb4">+4</span>`:pv===2?`<span class="pb pb2">+2</span>`:'';
      const isPen=+pk.s1===+pk.s2;
      const lbl2=isPen?`${pk.clf} 🥅`:pk.clf;
      const sc=pk.s1!==undefined?`${pk.s1}-${pk.s2}`:(pk.score||'');
      return `<td><span class="pf ${isPen?'p':'w'}">${lbl2}</span>${badge}<div class="sb">${sc}</div></td>`;
    }).join('');
    tr.innerHTML=`<td>${lbl}</td>${cells}`;
    tb.appendChild(tr);
  });
}

function showPanel(n,b){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  document.getElementById(`panel-${n}`).classList.add('active');
  if(b) b.classList.add('active');
  if(n==='tabla') loadTabla();
}

let tt;
function toast(m,t='ok'){
  const el=document.getElementById('toast');
  el.textContent=m;el.className=`show ${t}`;
  clearTimeout(tt);tt=setTimeout(()=>el.className='',2500);
}

init();
</script>
</body>
